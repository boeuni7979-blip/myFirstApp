<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="고급스러운 디자인의 회원가입 페이지입니다.">
    <title>회원가입 | 프리미엄 포털</title>
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <div class="container" id="signupContainer">
        <header class="header">
            <h1>계정 생성</h1>
            <p>프리미엄 커뮤니티의 일원이 되어보세요.</p>
        </header>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="name">이름</label>
                <div class="input-container">
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">이메일 주소</label>
                <div class="input-container">
                    <input type="email" id="email" name="email" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <div class="input-container">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">
                        최소 8자 이상의 비밀번호를 입력해 주세요.
                    </p>
                </div>
            </div>

            <div class="remember-me">
                <label>
                    <input type="checkbox" name="terms" required>
                    <a href="#">이용약관</a>에 동의합니다
                </label>
            </div>

            <button type="submit" class="btn" id="signupBtn">시작하기</button>
        </form>

        <p class="footer-text">
            이미 계정이 있으신가요? <a href="login.html">여기서 로그인하세요</a>
        </p>
    </div>
    <script src="index.js"></script>
</body>

</html>
