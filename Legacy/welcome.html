<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환영합니다 | 봄의 포털</title>
    <link rel="stylesheet" href="auth.css">
    <style>
        :root {
            --spring-bg: linear-gradient(135deg, #fff5f7 0%, #fff9db 50%, #f0fff4 100%);
            --petal-pink: #ffb7c5;
            --leaf-green: #98d8a0;
            --text-dark: #2d3436;
        }

        body {
            background: var(--spring-bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 벚꽃 효과 */
        .petal {
            position: absolute;
            background-color: var(--petal-pink);
            border-radius: 150% 0 150% 0;
            opacity: 0.3;
            z-index: -1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .welcome-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 4rem 3rem;
            border-radius: 32px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            animation: springUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes springUp {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .spring-header h1 {
            font-size: 2.8rem;
            color: var(--text-dark);
            background: none;
            -webkit-text-fill-color: initial;
            margin-bottom: 1rem;
        }

        .user-highlight {
            color: var(--petal-pink);
            position: relative;
            display: inline-block;
        }

        .user-highlight::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            height: 10px;
            background: rgba(255, 183, 197, 0.3);
            z-index: -1;
        }

        .spring-message {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn-home {
            background: linear-gradient(to right, var(--petal-pink), #ff9a9e);
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 183, 197, 0.4);
        }

        .btn-home:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 25px rgba(255, 183, 197, 0.5);
        }

        .logout-link {
            display: block;
            margin-top: 1.5rem;
            color: #b2bec3;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .logout-link:hover {
            color: #ff7675;
        }
    </style>
</head>

<body>
    <!-- 벚꽃 잎 요소들 (JS로 동적 생성) -->
    <div id="petals-container"></div>

    <div class="welcome-container">
        <header class="spring-header">
            <h1 style="white-space: nowrap;">환영합니다, <span id="displayUserName" class="user-highlight">사용자</span>님!</h1>
            <p class="spring-message">
                따스한 햇살과 함께 새로운 시작이 찾아왔습니다.<br>
                봄의 기운을 담은 특별한 경험을 시작해 보세요.
            </p>
        </header>

        <div class="content">
            <button class="btn-home" onclick="navigateTo('index.html')">홈으로 이동</button>
            <a href="#" onclick="handleLogout()" class="logout-link">로그아웃</a>
        </div>
    </div>

    <script src="index.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));

            if (!loggedInUser) {
                alert('로그인이 필요한 페이지입니다.');
                window.location.href = 'login.html';
                return;
            }

            // 이름 표시
            document.getElementById('displayUserName').textContent = loggedInUser.name;

            // 벚꽃 잎 생성
            const petalsContainer = document.getElementById('petals-container');
            for (let i = 0; i < 20; i++) {
                createPetal();
            }

            function createPetal() {
                const petal = document.createElement('div');
                petal.className = 'petal';

                const size = Math.random() * 10 + 10 + 'px';
                petal.style.width = size;
                petal.style.height = size;

                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = Math.random() * 5 + 5 + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';

                petalsContainer.appendChild(petal);
            }
        });
    </script>
</body>

</html>
